            padding: 20px;

            justify-content: center;

            flex-wrap: wrap;
        }

            background-color: #e2e8f0;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .exercise-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .cloze-text {
            font-size: 1.1rem;
            text-align: justify;
            margin-bottom: 30px;
        }

        select {
            padding: 4px 6px;
            font-size: 0.95rem;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            margin: 2px 4px;
        }

        select.correct {
            border-color: var(--success);
            background-color: #f0fdf4;
        }

        select.incorrect {
            border-color: var(--incorrect);
            background-color: #fef2f2;
        }

        .action-div {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit { background: var(--secondary); color: white; }
        .btn-submit:hover { background: #0f766e; }
        .btn-reset { background: #64748b; color: white; }

        .explanation-box {
            margin-top: 30px;
            padding: 25px;
            background: #f1f5f9;
            border-left: 5px solid var(--primary);
            border-radius: 0 5px 5px 0;
            display: none;
        }

        .explanation-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #cbd5e1;
        }
        .explanation-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    </style>

let currentExerciseIdx = 0;

function setupNavigation() {
    const nav = document.getElementById('navButtons');
    nav.innerHTML = '';
    exercises.forEach((ex, idx) => {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${idx === currentExerciseIdx ? 'active' : ''}`;
        btn.innerText = `Ex ${ex.id}`;
        btn.onclick = () => switchExercise(idx);
        nav.appendChild(btn);
    });
}

function switchExercise(idx) {
    currentExerciseIdx = idx;
    setupNavigation();
    renderExercise();
}

function renderExercise() {
    const container = document.getElementById('exerciseContainer');
    const ex = exercises[currentExerciseIdx];

    container.innerHTML = `
        <div class="exercise-card">
            <span class="tag">${ex.tag}</span>
            <h2>${ex.title}</h2>
            <p class="subtitle" style="font-size:0.95rem; margin-top:-5px; color:#64748b;">Choose the best word for each of the 10 blanks to finish the story.</p>
            <hr style="border:0; border-top: 1px solid #e2e8f0; margin: 15px 0;">
            <div class="cloze-text">${ex.text}</div>
            
            <div class="action-div">
                <button class="btn btn-submit" onclick="checkAnswers()">Check My Answers</button>
                <button class="btn btn-reset" onclick="resetExercise()">Reset</button>
            </div>

            <div class="explanation-box" id="explanationBox">
                <h3>Score & Simple Explanations (B1 Level)</h3>
                <div id="explanationContent"></div>
            </div>
        </div>
    `;

    for (const key in ex.options) {
        const selectEl = document.getElementById(key);
        if (selectEl) {
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.text = "?";
            selectEl.appendChild(defaultOpt);

            const shuffledOptions = [...ex.options[key]].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(opt => {
                const optionEl = document.createElement('option');
                optionEl.value = opt[0];
                optionEl.text = opt[0];
                selectEl.appendChild(optionEl);
            });
        }
    }
}

function checkAnswers() {
    const ex = exercises[currentExerciseIdx];
    let expContent = "";
    let correctCount = 0;
    
    for (const key in ex.options) {
        const selectEl = document.getElementById(key);
        const selectedValue = selectEl.value;
        const correctTuple = ex.options[key].find(opt => opt[1] === true);
        const correctAnswer = correctTuple[0];

        if (selectedValue === correctAnswer) {
            selectEl.className = "correct";
            correctCount++;
        } else {
            selectEl.className = "incorrect";
        }

        expContent += `<div class="explanation-item">
            <strong>Blank ${key.split('_')[1]}:</strong> 
            <span style="color:${selectedValue === correctAnswer ? 'var(--success)' : 'var(--incorrect)'}; font-weight:bold;">
                ${selectedValue === correctAnswer ? '✓ Correct' : '✗ Incorrect (Answer is: ' + correctAnswer + ')'}
            </span><br>${ex.explanations[key]}
        </div>`;
    }

    const expBox = document.getElementById('explanationBox');
    const expContentDiv = document.getElementById('explanationContent');
    expContentDiv.innerHTML = `<p style="font-weight:bold; font-size:1.2rem; color:var(--primary);">Great effort! You scored ${correctCount} out of 10!</p>` + expContent;
    expBox.style.display = "block";
    expBox.scrollIntoView({ behavior: 'smooth' });
}

function resetExercise() { renderExercise(); }

window.onload = () => {
    setupNavigation();
    renderExercise();
};
